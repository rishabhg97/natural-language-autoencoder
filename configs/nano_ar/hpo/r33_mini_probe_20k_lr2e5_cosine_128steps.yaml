run:
  name: nano-ar-r33-mini-probe-20k-lr2e5-cosine-128steps
  experiment_class: geometry-probe
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-layer-probes
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-ar-layer-probes

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  critic_init_model_id: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-critic-init/nano-ar-r33-critic-init
  input_ar_source: /workspace/interp/outputs/nano30b-nla-pilot/layer_probe_r33
  input_ar_sft: /workspace/interp/outputs/nano30b-nla-pilot/layer_probe_r33/ar_sft_r33_start10500_len2048.parquet

dataset:
  row_limit: 20416
  split_mode: doc
  fractions: {train: 0.9, validation: 0.05, test: 0.05}
  materialize_splits: true
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688
  seed: 42

training:
  objective: ar_sft
  backend: miles_fsdp2
  epochs: 1
  num_rollout: 128
  global_batch_size: 192
  micro_batch_size: 8
  rollout_batch_size: 192
  lr: 2e-5
  min_lr: 2e-6
  lr_decay_style: cosine
  lr_warmup_iters: 20
  grad_norm_policy: clip
  timing_debug: true
  gradient_checkpointing: true
  allow_packed_critic_training: true

checkpoint:
  save_interval: 128
  keep_last: 1
  save_enabled: true
  no_save_optim: true
  require_optimizer_state_for_hero: false

eval:
  interval: 128
  controls: [teacher, teacher_shuffled, blank, generic, mean, source_context, source_raw]
  validation_limit: 512
  test_limit: 512
