schema_version: nano_roundtrip_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-publication-current
  environment:
    WANDB_MODE: offline
    TOKENIZERS_PARALLELISM: "false"
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  launch_guard:
    block_if_process_matches:
      - '(^|\s)\S*python\S*\s+scripts/nano_ar_hpo_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/nano_av_probe_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+\S*train\.py\s+.*--train-backend'
      - '(^|\s)\S*python\S*\s+scripts/eval_nano_[^\s]+\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/[^\s]*convert_fsdp[^\s]*\.py(\s|$)'
  study_jsonl: /workspace/interp/outputs/nano30b-nla-pilot/publication/studies/r33_online_joint_hpo8_h1_component_decomposition_trials.jsonl
items:
  - name: r33-online-joint-hpo8-h1-v128-actor-only-score
    config: configs/nano_roundtrip/publication/r33_online_joint_hpo8_h1_actor_only_v128_score.yaml
    status: pending
    notes: Score H1 AV generations through the untouched clean-SFT AR checkpoint.
  - name: r33-online-joint-hpo8-h1-v128-critic-only-score
    config: configs/nano_roundtrip/publication/r33_online_joint_hpo8_h1_critic_only_v128_score.yaml
    status: pending
    notes: Score clean-SFT AV generations through the H1 online-updated AR checkpoint.
