run:
  name: nano-av-miles-fsdp2-resume-smoke
  experiment_class: medium-small
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-medium
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-av-miles-fsdp2-sft

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  input_av_sft: /workspace/interp/outputs/nano30b-nla-pilot/av-r27-100k-rslora-batch8-epoch1-v1/av-r27-99570-rslora-r192-broad-scale75-lr1e5-b8-e1-epoch-gen8-save-2gpu-offline-20260527T0250Z/av_sft.parquet

dataset:
  row_limit: 960
  split_mode: doc
  fractions: {train: 0.8, validation: 0.1, test: 0.1}
  materialize_splits: true
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688

training:
  backend: miles_fsdp2
  epochs: 1
  resume_steps: 1
  global_batch_size: 96
  micro_batch_size: 8
  rollout_batch_size: 96
  lr: 1e-5
  injection_scale: 75
  grad_norm_policy: skip_diagnostic
  timing_debug: true
  gradient_checkpointing: true

checkpoint:
  # Set this to the checkpoint root containing latest_checkpointed_iteration.txt
  # before preparing the run, for example:
  # /workspace/interp/outputs/.../checkpoints
  resume_from: /workspace/interp/outputs/nano30b-nla-pilot/SET_RESUME_CHECKPOINT_ROOT
  save_interval: 1000
  keep_last: 1
  save_enabled: false
  no_save_optim: true
  require_optimizer_state_for_hero: false

eval:
  controls: [real, shuffled, zero, mean, none]
  validation_limit: 32
  test_limit: 32
  generation_examples: 0
