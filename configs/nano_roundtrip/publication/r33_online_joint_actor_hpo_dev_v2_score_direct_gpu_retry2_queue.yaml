schema_version: nano_roundtrip_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-publication-current
  environment:
    WANDB_MODE: offline
    TOKENIZERS_PARALLELISM: "false"
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  launch_guard:
    block_if_process_matches:
      - '(^|\\s)\\S*python\\S*\\s+scripts/nano_ar_hpo_queue\\.py(\\s|$)'
      - '(^|\\s)\\S*python\\S*\\s+scripts/nano_av_probe_queue\\.py(\\s|$)'
      - '(^|\\s)\\S*python\\S*\\s+\\S*train\\.py\\s+.*--train-backend'
      - '(^|\\s)\\S*python\\S*\\s+scripts/eval_nano_[^\\s]+\\.py(\\s|$)'
      - '(^|\\s)\\S*python\\S*\\s+scripts/[^\\s]*convert_fsdp[^\\s]*\\.py(\\s|$)'
  study_jsonl: /workspace/interp/outputs/nano30b-nla-pilot/publication/studies/r33_online_joint_actor_hpo_dev_v2_direct_gpu_retry2_score_trials.jsonl
items:
  - name: r33-clean-sft-online-joint-actor-hpo-dev-v2-score-direct-gpu-retry2
    config: configs/nano_roundtrip/publication/r33_clean_sft_online_joint_actor_hpo_dev_v2_score_direct_gpu_retry2.yaml
    status: pending
    notes: Retry the v2 score after restoring the dependency's checkpoint-directory remote-code patch API; reuse the completed 122-family generations unchanged.
