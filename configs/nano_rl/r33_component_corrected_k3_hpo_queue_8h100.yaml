schema_version: nano_rl_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-hero-current
  python: /workspace/interp/.venvs/sglang-cu130/bin/python
  post_eval_scoring_python: /workspace/interp/.venv/bin/python
  miles_root: /workspace/interp/code/miles-051cd15
  rl_script: external/natural_language_autoencoders/configs/rl.sh
  workspace_gpus: 8
  env:
    WANDB_MODE: offline
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    NLA_EMBED_DUMP_DIR: /dev/shm/nla
    NLA_BYPASS_ROUTER: '1'
    NLA_BF16_B64_EMBEDS: '1'
    NLA_FREEZE_CRITIC_TRAIN: '1'
    NLA_ASSERT_PACKED_EQUIV: '0'
    NLA_CRITIC_FWD_DISABLE_MAMBA_FAST_PATH: '1'
    NLA_ROUTER_METRICS: '1'
    NLA_PREWARM_HF_MODULES: '1'
    NLA_WEIGHT_UPDATE_LOG_EVERY: '64'
    HF_MODULES_CACHE: /dev/shm/nano30b-nla-pilot/hf_modules_cache/r33_corrected_k3
  wandb:
    mode: offline
    project: nano30b-nla-pilot
    group: nano-rl-r33-corrected-k3
  launch:
    requires_approval: true
    approved: false
  source:
    roots:
    - scripts
    - external/natural_language_autoencoders/nla
    - external/natural_language_autoencoders/configs
    require_expected_fingerprint: true
    expected_code_sha256: 8055633ae7917a6fb2f2579b8afc2373bb904876c2a4fa209b0694e9c8b20d3a
    frozen_git_commit: 0974ca3317db333f2355c1faaa09c583a0e09e42
  runtime_contracts:
  - name: miles_fsdp_actor_local_grad_norm
    path: /workspace/interp/code/miles-051cd15/miles/backends/fsdp_utils/actor.py
    sha256: 7db9b4acfbc7af734dee736c8a549cdd5a3f6d31c46e4d7d53f8028b62357479
    contains:
    - from nla.audit_runtime import aggregate_train_losses_by_key, clip_grad_norm_local_shards
    - if getattr(self.args, "nla_local_grad_norm", True)
    - clip_grad_norm_local_shards(
    - process_group=self.parallel_state.dp_group
    - aggregate_train_losses_by_key(losses_reduced, self.parallel_state)
  - name: miles_fsdp_local_grad_norm_argument
    path: /workspace/interp/code/miles-051cd15/miles/backends/fsdp_utils/arguments.py
    sha256: 203c1a77678d3fd9fb982c0ee75a28fe92843dd32d969f6cb418f711bb11f943
    contains:
    - 'nla_local_grad_norm: bool = True'
  resources:
    actor_nodes: 1
    actor_gpus: 6
    critic_nodes: 1
    critic_gpus: 1
    rollout_gpus: 1
    min_actor_gpus: 6
  training:
    train_backend: fsdp
    critic_lr: 1e-5
    actor_micro_batch: 32
    require_exact_actor_batch: true
    attn_implementation: eager
    gradient_checkpointing: true
    kl_loss_type: k3
    kl_loss_coef: 0.001
    loss_mask_type: qwen
    lr_decay_style: constant
    finetune: true
    no_load_optim: true
    resume_policy: restart_only
    fsdp_reduce_dtype: bfloat16
    fsdp_disable_backward_prefetch: true
    advantage_estimator: grpo
    normalize_advantages: false
    rewards_normalization: true
    grpo_std_normalization: true
    drift_guard:
      enabled: true
      max_logprob_abs_diff: 0.75
      consecutive_steps: 2
    guard_rules:
    - metric: train/kl_loss
      comparison: max
      threshold: 5.0
      consecutive_steps: 2
      role_prefixes: [actor]
  rollout:
    rollout_batch_size: 48
    n_samples_per_prompt: 8
    global_batch_size: 384
    require_global_batch_match: true
    max_response_len: 256
    max_context_len: 512
    num_rollout: 8
    shuffle: true
    seed: 42
    guard_rules:
    - metric: rollout/nla_parse/closed_frac
      comparison: min
      threshold: 0.90
      consecutive_steps: 1
      role_prefixes: [rollout]
    - metric: rollout/nla_parse/usable_frac
      comparison: min
      threshold: 0.90
      consecutive_steps: 1
      role_prefixes: [rollout]
    - metric: rollout/nla_response_length/p95
      comparison: increasing
      min_delta: 1.0
      consecutive_steps: 4
      role_prefixes: [rollout]
  sglang:
    mode: external
    python: /workspace/interp/.venvs/sglang-cu130/bin/python
    managed: true
    terminate_on_exit: true
    tensor_parallel_size: 1
    base_gpu_id: 6
    rollout_num_gpus_per_engine: 1
    env:
      SGLANG_MIN_NEW_TOKEN_RATIO_FACTOR: '1'
    engine_addrs:
    - 127.0.0.1:31000
    timeout_seconds: 1200
    poll_seconds: 2
    model_staging:
      enabled: true
      source_model_path: /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
      target_path: /dev/shm/nano30b-nla-pilot/sglang_models/r33_component_full_actor_sft_iter_0001291
      reuse_existing: true
      clean: true
      release_after_health:
        enabled: true
        globs:
        - model-*.safetensors
    start_commands:
    - - /workspace/interp/.venvs/sglang-cu130/bin/python
      - -m
      - sglang.launch_server
      - --model-path
      - /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
      - --host
      - 127.0.0.1
      - --port
      - '31000'
      - --tp-size
      - '1'
      - --base-gpu-id
      - '6'
      - --trust-remote-code
      - --skip-server-warmup
      - --disable-radix-cache
      - --disable-custom-all-reduce
      - --attention-backend
      - fa3
      - --schedule-conservativeness
      - '1.5'
      - --enable-draft-weights-cpu-backup
    health_urls:
    - http://127.0.0.1:31000/health_generate
  post_eval:
    roundtrip:
      enabled: true
      resume_generated: true
      origin_hf_dir: /workspace/interp/models/nano-30b-a3b-bf16-hf
      ar_checkpoint_dir: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-r33-component-full/nano-ar-r33-component-full-hero-lr5e5-cosine-warmup25-gb192-mb96/checkpoints/iter_0001289
