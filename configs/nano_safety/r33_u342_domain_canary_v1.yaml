  av_dcp: /workspace/interp/outputs/nano30b-nla-pilot/publication/r33_online_rl/internal_hero/a3e5_u342/actor/iter_0000342
  av_hf: /dev/shm/nano30b-nla-pilot/domain_eval/r33_u342_rl_av
