schema_version: nano_roundtrip_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-publication-current
  environment:
    WANDB_MODE: offline
    TOKENIZERS_PARALLELISM: "false"
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  launch_guard:
    block_if_process_matches:
      - '(^|\s)\S*python\S*\s+scripts/nano_ar_hpo_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/nano_av_probe_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+\S*train\.py\s+.*--train-backend'
      - '(^|\s)\S*python\S*\s+scripts/eval_nano_[^\s]+\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/[^\s]*convert_fsdp[^\s]*\.py(\s|$)'
items:
  - name: r33-sft-primary-strict-score-family512
    config: configs/nano_roundtrip/publication/r33_sft_primary_strict_score.yaml
    status: pending
    notes: Strict parse-quality and generated-file provenance for the primary SFT reference.
  - name: r33-hero-primary-length-score-family512
    config: configs/nano_roundtrip/publication/r33_hero_primary_length_score.yaml
    status: pending
    notes: Primary critic with SFT- and teacher-length-matched hero variants.
  - name: r33-sft-independent-strict-score-family512
    config: configs/nano_roundtrip/publication/r33_sft_independent_score.yaml
    status: pending
    notes: Same cached SFT text rescored by the retained independent critic.
  - name: r33-hero-independent-length-score-family512
    config: configs/nano_roundtrip/publication/r33_hero_independent_score.yaml
    status: pending
    notes: Same cached hero text under the independent critic and length controls.
