run:
  name: nano-ar-r27-best1547-continue-lr2e5-cosine-256steps
  experiment_class: tuning-probe
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-hpo
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-ar-miles-fsdp2-hpo

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  critic_init_model_id: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-critic-init/nano-ar-r27-critic-init
  input_ar_source: /workspace/interp/code/nano30b-nla-pilot-current/runs/introspection/ar-r27-r30-fullscan-20260528T234403Z/R_27
  input_ar_sft: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-fullscan/nano-ar-miles-fsdp2-r27-fullscan-275k-gb192-mb8-lr1e5-20260530T172928Z/splits/train_padded.parquet

dataset:
  row_limit: 247872
  split_mode: doc
  fractions: {train: 0.9, validation: 0.05, test: 0.05}
  materialize_splits: false
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688

training:
  objective: ar_sft
  backend: miles_fsdp2
  epochs: 1
  resume_steps: 256
  global_batch_size: 192
  micro_batch_size: 8
  rollout_batch_size: 192
  lr: 2e-5
  min_lr: 2e-6
  lr_decay_style: cosine
  lr_warmup_iters: 50
  grad_norm_policy: clip
  timing_debug: true
  gradient_checkpointing: true
  allow_packed_critic_training: true

checkpoint:
  resume_from: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-hpo/nano-ar-r27-fullscan-continue-qwen-lr2e5-cosine-256steps-20260601T0019Z/checkpoints
  finetune: true
  save_interval: 256
  keep_last: 1
  save_enabled: true
  no_save_optim: true
  require_optimizer_state_for_hero: false

eval:
  interval: 256
  controls: [teacher, teacher_shuffled, blank, generic, mean, source_context, source_raw]
  validation_limit: 512
  test_limit: 512
