    stage_copy_workers: 32
    stage_copy_task_bytes: 536870912
    cleanup_staged_dcp_after_conversion: true
    origin_hf_dir: /workspace/interp/models/nano-30b-a3b-bf16-hf
    output_hf_dir: /dev/shm/nano30b-nla-pilot/publication/r33-online-joint-actor-hpo-dev/av_iter_0001291
    torch_dtype: bfloat16
    fingerprint_report_json: /workspace/interp/outputs/nano30b-nla-pilot/publication/r33_online_rl/actor_hpo_dev/baseline/av_checkpoint_fingerprints.json
    convert_log: /workspace/interp/outputs/nano30b-nla-pilot/publication/r33_online_rl/actor_hpo_dev/v2/baseline/av_dcp_to_hf.log
    cleanup_after_queue: true
  study_jsonl: /workspace/interp/outputs/nano30b-nla-pilot/publication/studies/r33_online_joint_actor_hpo_dev_v2_baseline_trials.jsonl
