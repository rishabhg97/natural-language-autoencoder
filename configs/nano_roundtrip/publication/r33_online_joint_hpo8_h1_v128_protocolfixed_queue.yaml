schema_version: nano_roundtrip_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-publication-current
  environment:
    WANDB_MODE: offline
    TOKENIZERS_PARALLELISM: "false"
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  launch_guard:
    block_if_process_matches:
      - '(^|\s)\S*python\S*\s+scripts/nano_ar_hpo_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/nano_av_probe_queue\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+\S*train\.py\s+.*--train-backend'
      - '(^|\s)\S*python\S*\s+scripts/eval_nano_[^\s]+\.py(\s|$)'
      - '(^|\s)\S*python\S*\s+scripts/[^\s]*convert_fsdp[^\s]*\.py(\s|$)'
  study_jsonl: /workspace/interp/outputs/nano30b-nla-pilot/publication/studies/r33_online_joint_hpo8_h1_protocolfixed_trials.jsonl
items:
  - name: r33-clean-sft-online-joint-hpo8-v128-rowmatched-score
    config: configs/nano_roundtrip/publication/r33_clean_sft_online_joint_hpo8_v128_rowmatched_score.yaml
    status: pending
    notes: Score the cached clean-SFT generations filtered to the exact H1 validation rows and order.
  - name: r33-online-joint-hpo8-h1-v128-protocolfixed-generate
    config: configs/nano_roundtrip/publication/r33_online_joint_hpo8_h1_v128_protocolfixed_generate.yaml
    status: pending
    notes: Regenerate H1 validation rows with the exact clean-SFT seed, stop text, and padded-train provenance.
  - name: r33-online-joint-hpo8-h1-v128-protocolfixed-score
    config: configs/nano_roundtrip/publication/r33_online_joint_hpo8_h1_v128_protocolfixed_score.yaml
    status: pending
    notes: Strict paired score of the corrected H1 generations against the registered clean-SFT report.
