roundtrip_endpoint:
  primary_metric: directional_mse
  definition: 2 * (1 - cosine)
  primary_variant: av_real
  required_controls: [av_shuffled, av_zero, av_mean, av_none, mean]
  max_primary_directional_mse: 0.35
  max_primary_gap_to_teacher: 0.05
  min_control_margin: 0.1344
  min_rowwise_win_fraction: 0.90
  min_closed_fraction: 0.95
  min_usable_fraction: 0.99
  max_sign_flip_p_value: 0.01
  require_raw_magnitude_claim: false

functional_endpoint:
  required_variants: [candidate, teacher, stored_gold, mean, zero, shuffled]
  candidate_control_variants: [mean, zero, shuffled]
  primary_metrics: [kl_original_to_patched, js_divergence]
  secondary_metrics: [logit_pearson, top_10_overlap, top_50_overlap, original_top1_rank]
  min_family_better_fraction: 0.50
  require_fresh_forward_activation_fidelity_for_fresh_forward_claim: true

activation_fidelity:
  max_relative_l2: 0.01
  max_abs: 0.01
  max_one_minus_cos: 0.0001
  repeated_forward_required: true
  family_stratified_rows: 64

statistics:
  independent_unit: content_family_id
  bootstrap_samples: 10000
  bootstrap_seed: 20260715
  permutation_samples: 100000
  permutation_seed: 20260715
  primary_alpha: 0.01
  secondary_multiplicity: holm
  minimum_power: 0.80

reporting:
  mandatory_metrics:
    - directional_mse
    - cosine
    - raw_mse
    - centered_raw_r2
    - norm_ratio_mean
    - parse_closed_fraction
    - parse_usable_fraction
  disclose_historical_test_exposure: true
  disclose_teacher_lineage: true
  disclose_kernel_profiles: true
  disclose_fresh_forward_status: true
