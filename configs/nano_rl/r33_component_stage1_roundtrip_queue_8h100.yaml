  - --output-jsonl
  - /workspace/interp/outputs/nano30b-nla-pilot/validity/r33-sft/roundtrip_v512_t512_generated_enriched.jsonl
  - --report-json
  - /workspace/interp/outputs/nano30b-nla-pilot/validity/r33-sft/roundtrip_v512_t512_provenance_report.json
  - --overwrite
- name: sft-score-v512
  status: pending
  kind: score
  command:
  - /workspace/interp/.venv/bin/python
  - scripts/nano_roundtrip_eval_config.py
  - configs/nano_roundtrip/r33_stage1_sft_v512_score.yaml
  - --run
