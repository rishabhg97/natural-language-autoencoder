run:
  name: nano-ar-r33-100k-lr1e5-cosine-gb192-mb12-gpu1
  experiment_class: tuning-probe
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-r33-scaling
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-ar-r33-scaling

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  critic_init_model_id: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-critic-init/nano-ar-r33-critic-init
  input_ar_source: /workspace/interp/outputs/nano30b-nla-pilot/r33_prefix_fullscan275396
  input_ar_sft: /workspace/interp/outputs/nano30b-nla-pilot/r33_prefix_fullscan275396/ar_sft_R33_r33_prefix_fullscan275396.parquet

dataset:
  row_limit: 99570
  split_mode: doc
  fractions: {train: 0.9, validation: 0.05, test: 0.05}
  materialize_splits: true
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688
  seed: 42

training:
  objective: ar_sft
  backend: miles_fsdp2
  epochs: 1
  num_gpus: 1
  global_batch_size: 192
  micro_batch_size: 12
  rollout_batch_size: 192
  lr: 1e-5
  min_lr: 1e-6
  lr_decay_style: cosine
  lr_warmup_iters: 50
  grad_norm_policy: clip
  timing_debug: true
  gradient_checkpointing: true
  allow_packed_critic_training: true

checkpoint:
  save_interval: 467
  keep_last: 1
  save_enabled: true
  no_save_optim: true
  require_optimizer_state_for_hero: false

eval:
  interval: 467
  controls: [teacher, teacher_shuffled, blank, generic, mean, source_context, source_raw]
  validation_limit: 512
  test_limit: 512
