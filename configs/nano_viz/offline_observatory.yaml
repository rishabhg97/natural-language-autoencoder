selection:
  population: QUALIFIED
  split: validation
  deep_dive_rows: 50
  behavior_rows: 24
  canary_rows: 8
  film_rows: 10
  film_min_position: 130
  seed: 20260716

grid:
  clause_chips: 6
  clause_lanes: [edit, paraphrase_placebo, random_edit]
  behavior_doses: [0.5, 1.0]
  section_subsets: 16
  word_occlusion_limit: 80
  truncation_points: 10
  paraphrase_types: 6
  corruption_types: [shuffle, delete]
  corruption_rates: [0.10, 0.25, 0.50]
  alternate_tellings: 8
  wake_positions: 16
  continuation_tokens: 32

evaluation:
  torch_dtype: bfloat16
  stage_copy_workers: 8
  boundary: 33
  injection_scale: 75
  max_new_tokens: 256
  av_max_target_tokens: 256
  av_score_batch_size: 1
  av_score_candidate_batches: [1, 2, 4, 8]
  av_generation_batch_size: 1
  av_device_map: auto
  ar_device_map: auto
  base_device_map: auto
  ar_batch_size: 1
  ar_batch_candidate_batches: [1, 2, 4, 8]
  ar_max_length: 1152
  lattice_shard_cells: 512
  functional_batch_size: 1
  functional_shard_cells: 32
  functional_generation_backend: full_prefix
  trace_generation_batch_size: 5
  film_min_context_tokens: 32
  film_positions_per_doc: 40
  top_k: [10, 50]
  generation_seed: 20260716
  sampling_temperature: 0.7
  sampling_top_p: 0.95
  controls: [real, shuffled, zero, mean, none]
  phases: [canary, token_logprobs, lattice_pilot, functional_pilot, trace_pilot, court_calibration, full]

gates:
  require_validation_only: true
  require_exact_deep_dive_rows: 50
  require_exact_behavior_rows: 24
  require_exact_canary_rows: 8
  require_parse_usable_fraction: 0.99
  require_parse_closed_fraction: 0.95
  alternate_parse_usable_fraction: 0.90
  av_batch_equivalence_max_loss_delta: 0.01
  av_batch_equivalence_max_logprob_delta: 0.05
  ar_batch_equivalence_max_relative_l2: 0.001
  canary_ar_max_directional_mse: 0.50
  require_finite_vectors: true
  identity_relative_l2: 0.01
  identity_max_abs: 0.01
  identity_one_minus_cos: 0.0001
  require_control_group_completeness: true
  require_family_clustered_intervals: true
  require_no_test_lattice_rows: true
  require_text_privacy_pass: true
