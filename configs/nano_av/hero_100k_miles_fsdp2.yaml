run:
  name: nano-av-miles-fsdp2-r27-super-thinking-100k-hero
  experiment_class: complete-performance
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-hero
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-av-miles-fsdp2-sft

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  input_av_sft: /workspace/interp/outputs/nano30b-nla-pilot/av-r27-100k-rslora-batch8-epoch1-v1/av-r27-99570-rslora-r192-broad-scale75-lr1e5-b8-e1-epoch-gen8-save-2gpu-offline-20260527T0250Z/av_sft.parquet

dataset:
  row_limit: 99570
  split_mode: doc
  fractions: {train: 0.9, validation: 0.05, test: 0.05}
  materialize_splits: true
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688

training:
  backend: miles_fsdp2
  epochs: 1
  global_batch_size: 192
  micro_batch_size: 8
  rollout_batch_size: 192
  lr: 1e-5
  injection_scale: 75
  grad_norm_policy: clip
  timing_debug: false
  gradient_checkpointing: true

checkpoint:
  save_interval: 100
  keep_last: 1
  save_enabled: true
  require_optimizer_state_for_hero: true

eval:
  interval: 100
  controls: [real, shuffled, zero, mean, none]
  validation_limit: 512
  test_limit: 512
  generation_examples: 8
