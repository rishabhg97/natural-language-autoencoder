schema_version: nano_rl_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  python: /workspace/interp/.venvs/sglang-cu130/bin/python
  post_eval_scoring_python: /workspace/interp/.venv/bin/python
  miles_root: /workspace/interp/code/miles-051cd15
  rl_script: external/natural_language_autoencoders/configs/rl.sh
  workspace_gpus: 8
  env:
    WANDB_MODE: offline
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    NLA_EMBED_DUMP_DIR: /dev/shm/nla
    NLA_BYPASS_ROUTER: "1"
    NLA_BF16_B64_EMBEDS: "1"
    NLA_FREEZE_CRITIC_TRAIN: "1"
    # The critic is reward-only in this queue, so its unused optimizer layout
    # is not a validity gate. Reward-path correctness is covered by preflight.
    NLA_ASSERT_PACKED_EQUIV: "0"
    NLA_CRITIC_FWD_DISABLE_MAMBA_FAST_PATH: "1"
    NLA_ROUTER_METRICS: "1"
    NLA_PREWARM_HF_MODULES: "1"
    NLA_WEIGHT_UPDATE_LOG_EVERY: "1"
    RAY_DEDUP_LOGS: "0"
    NCCL_DEBUG: INFO
    NCCL_DEBUG_SUBSYS: "INIT,COLL,NET"
    TORCH_NCCL_DESYNC_DEBUG: "1"
    TORCH_NCCL_TRACE_BUFFER_SIZE: "2000"
    TORCH_NCCL_DUMP_ON_TIMEOUT: "1"
    TORCH_NCCL_ENABLE_TIMING: "1"
    HF_MODULES_CACHE: /dev/shm/nano30b-nla-pilot/hf_modules_cache/r33_corrected_k3_canary
  wandb:
    mode: offline
    project: nano30b-nla-pilot
    group: nano-rl-r33-corrected-k3-live-sync-canary
  resources:
    actor_nodes: 1
    actor_gpus: 6
    critic_nodes: 1
    critic_gpus: 1
    rollout_gpus: 1
    min_actor_gpus: 6
  training:
    train_backend: fsdp
    critic_lr: "1e-5"
    actor_micro_batch: 32
    require_exact_actor_batch: true
    attn_implementation: eager
    gradient_checkpointing: true
    kl_loss_type: k3
    kl_loss_coef: 0.001
    loss_mask_type: qwen
    lr_decay_style: constant
    finetune: true
    no_load_optim: true
    fsdp_reduce_dtype: bfloat16
    fsdp_disable_backward_prefetch: true
    advantage_estimator: grpo
    normalize_advantages: false
    rewards_normalization: true
    grpo_std_normalization: true
    drift_guard:
      enabled: true
      max_logprob_abs_diff: 0.75
      consecutive_steps: 2
  rollout:
    rollout_batch_size: 48
    n_samples_per_prompt: 8
    global_batch_size: 384
    require_global_batch_match: true
    max_response_len: 256
    max_context_len: 512
    num_rollout: 1
  sglang:
    mode: external
    python: /workspace/interp/.venvs/sglang-cu130/bin/python
    managed: true
    terminate_on_exit: true
    tensor_parallel_size: 1
    base_gpu_id: 6
    rollout_num_gpus_per_engine: 1
    env:
      SGLANG_MIN_NEW_TOKEN_RATIO_FACTOR: "1"
    engine_addrs: [127.0.0.1:31000]
    timeout_seconds: 1200
    poll_seconds: 2
    model_staging:
      enabled: true
      source_model_path: /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
      target_path: /dev/shm/nano30b-nla-pilot/sglang_models/r33_component_full_actor_sft_iter_0001291
      reuse_existing: true
      clean: true
    start_commands:
      - - /workspace/interp/.venvs/sglang-cu130/bin/python
        - -m
        - sglang.launch_server
        - --model-path
        - /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
        - --host
        - 127.0.0.1
        - --port
        - "31000"
        - --tp-size
        - "1"
        - --base-gpu-id
        - "6"
        - --trust-remote-code
        - --skip-server-warmup
        - --disable-radix-cache
        - --disable-custom-all-reduce
        - --attention-backend
        - fa3
        - --schedule-conservativeness
        - "1.5"
        - --enable-draft-weights-cpu-backup
    health_urls: [http://127.0.0.1:31000/health_generate]
  extra_args:
    - --no-save-optim
    - --sglang-attention-backend
    - fa3

items:
  - name: r33-corrected-k3-live-sync-canary-lr1e5-update1-retry1
    status: pending
    rl_parquet: /workspace/interp/outputs/nano30b-nla-pilot/r33_rl_train_only/rl_r33_train_only.parquet
    instruct_model: /workspace/interp/models/nano-30b-a3b-bf16-hf
    actor_sft_ckpt: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/checkpoints/iter_0001291
    actor_load_ckpt: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/checkpoints
    actor_ref_ckpt: /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
    actor_sidecar_source: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/checkpoints/iter_0001291
    critic_sl_ckpt: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-r33-component-full/nano-ar-r33-component-full-hero-lr5e5-cosine-warmup25-gb192-mb96/checkpoints/iter_0001289/hf
    run_dir: /workspace/interp/outputs/nano30b-nla-pilot/rl_diagnostics/r33_corrected_k3_live_sync_canary_lr1e5_update1_retry1
    rollout:
      rollout_batch_size: 48
      n_samples_per_prompt: 8
      global_batch_size: 384
      num_rollout: 1
    training:
      actor_lr: "1e-5"
      kl_loss_type: k3
      save_interval: 1
    post_eval:
      roundtrip:
        enabled: false
    wandb:
      run_id: r33-corrected-k3-live-sync-canary-lr1e5-update1-retry1
