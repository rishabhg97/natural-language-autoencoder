run:
  name: nano-ar-miles-fsdp2-r27-medium-small
  experiment_class: medium-small
  output_root: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-medium
  wandb_mode: offline
  wandb_project: nano30b-nla-pilot
  wandb_group: nano-ar-miles-fsdp2-sft

paths:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  miles_root: /workspace/interp/code/miles-051cd15
  model_id: /workspace/interp/models/nano-30b-a3b-bf16-hf
  critic_init_model_id: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-critic-init/nano-ar-r27-critic-init
  input_ar_source: /workspace/interp/artifacts/nano30b-nla-pilot/super-teacher-r27-100k-thinking-merged-20260525T2150Z/base_R27_super_thinking_99570_explained.parquet
  input_ar_sft: /workspace/interp/outputs/nano30b-nla-pilot/ar-r27-100k-qwen-faithful/ar_sft.parquet

dataset:
  row_limit: 960
  split_mode: doc
  fractions: {train: 0.8, validation: 0.1, test: 0.1}
  materialize_splits: true
  final_batch_policy: pad_with_train_duplicates
  expected_d_model: 2688

training:
  objective: ar_sft
  backend: miles_fsdp2
  epochs: 5
  global_batch_size: 96
  micro_batch_size: 8
  rollout_batch_size: 96
  lr: 1e-5
  grad_norm_policy: skip_diagnostic
  timing_debug: true
  gradient_checkpointing: true
  allow_packed_critic_training: true

checkpoint:
  save_interval: 45
  keep_last: 1
  save_enabled: true
  no_save_optim: true
  require_optimizer_state_for_hero: false

eval:
  controls: [teacher, teacher_shuffled, blank, generic, mean, source_context, source_raw]
  validation_limit: 128
  test_limit: 128
