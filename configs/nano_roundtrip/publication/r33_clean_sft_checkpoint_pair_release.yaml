claim_scope: family-disjoint directional AV-to-AR reconstruction and stored-snapshot functional recovery

limitations:
  - Raw activation magnitude is not recovered; centered raw R2 is negative on validation and test.
  - Functional evidence is stored-snapshot counterfactual reinjection because fresh-forward activation replay exceeds the preregistered tolerance.
  - The heldout test is family-disjoint from clean SFT training, but it is not guaranteed to be untouched by every historical project run.
  - AV and AR use the same Nano30B architecture family and teacher-summary lineage; no cross-critic generalization claim is made.
  - This release qualifies supervised AV+AR checkpoints only; it does not include or validate RL.

