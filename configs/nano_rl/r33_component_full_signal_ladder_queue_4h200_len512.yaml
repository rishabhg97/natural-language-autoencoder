schema_version: nano_rl_queue.v1
defaults:
  code_root: /workspace/interp/code/nano30b-nla-pilot-current
  python: /workspace/interp/.venvs/sglang-cu130/bin/python
  post_eval_python: /workspace/interp/.venv/bin/python
  miles_root: /workspace/interp/code/miles-051cd15
  rl_script: external/natural_language_autoencoders/configs/rl.sh
  workspace_gpus: 4
  launch:
    requires_approval: true
    approved: false
  env:
    WANDB_MODE: offline
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    NLA_EMBED_DUMP_DIR: /dev/shm/nla
    NLA_BYPASS_ROUTER: "1"
    NLA_BF16_B64_EMBEDS: "1"
    NLA_WEIGHT_UPDATE_LOG_EVERY: "100"
    NLA_FREEZE_CRITIC_TRAIN: "1"
    NLA_ASSERT_PACKED_EQUIV: "0"
    NLA_CRITIC_FWD_DISABLE_MAMBA_FAST_PATH: "1"
  wandb:
    project: nano30b-nla-pilot
    group: nano-rl-signal-ladder
  resources:
    actor_nodes: 1
    actor_gpus: 2
    critic_nodes: 1
    critic_gpus: 1
    rollout_gpus: 1
    min_actor_gpus: 2
  training:
    train_backend: fsdp
    actor_lr: 5e-7
    critic_lr: 1e-5
    actor_micro_batch: 1
    attn_implementation: eager
    advantage_estimator: grpo
    normalize_advantages: false
    rewards_normalization: true
    grpo_std_normalization: true
    kl_loss_coef: 0.0001
    save_interval: 8
    loss_mask_type: qwen
    lr_decay_style: constant
    finetune: true
    no_load_optim: true
    fsdp_reduce_dtype: bfloat16
    fsdp_disable_backward_prefetch: true
  rollout:
    rollout_batch_size: 4
    global_batch_size: 16
    n_samples_per_prompt: 4
    max_response_len: 512
    max_context_len: 512
    num_rollout: 8
  sglang:
    mode: external
    python: /workspace/interp/.venvs/sglang-cu130/bin/python
    managed: true
    terminate_on_exit: true
    env:
      SGLANG_MIN_NEW_TOKEN_RATIO_FACTOR: "1"
    engine_addrs:
      - 127.0.0.1:31000
    timeout_seconds: 900
    poll_seconds: 2
    start_commands:
      - - /workspace/interp/.venvs/sglang-cu130/bin/python
        - -m
        - sglang.launch_server
        - --model-path
        - /workspace/interp/outputs/nano30b-nla-pilot/rl_smoke/r33_component_full_sft_init_512row_3h200/actor_sft_hf_iter_0001291
        - --host
        - 127.0.0.1
        - --port
        - "31000"
        - --tp-size
        - "1"
        - --base-gpu-id
        - "2"
        - --trust-remote-code
        - --skip-server-warmup
        - --disable-radix-cache
        - --attention-backend
        - fa3
        - --schedule-conservativeness
        - "1.5"
        - --enable-draft-weights-cpu-backup
    health_urls:
      - http://127.0.0.1:31000/health_generate
  post_eval:
    roundtrip:
      enabled: true
      origin_hf_dir: /workspace/interp/models/nano-30b-a3b-bf16-hf
      ar_checkpoint_dir: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-ar-sft-r33-component-full/nano-ar-r33-component-full-hero-lr5e5-cosine-warmup25-gb192-mb96/checkpoints/iter_0001289
      train_parquet: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/splits/train_padded.parquet
      validation_parquet: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/splits/validation.parquet
      test_parquet: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/splits/test.parquet
      baseline_report_json: /workspace/interp/outputs/nano30b-nla-pilot/miles-fsdp2-av-sft-r33-component-full/nano-av-r33-component-full-hero-lr1e4-cosine-warmup25-gb192-mb2-seq1152-dyn512/roundtrip_iter_0001291_v256_t256_report.json
      validation_limit: 64
      test_limit: 64
      max_new_tokens: 256
      generation_backend: legacy_batch
      generation_workers: 4
      generation_worker_devices: ["0", "1", "2", "3"]
      generation_controls: [real, shuffled, zero, mean, none]
      generated_text_fallback: raw
      min_control_win_fraction: 0.9
      min_closed_fraction: 0.8
      min_usable_fraction: 0.95
      cleanup_hf: true
      cleanup_actor_checkpoint: true
  extra_args:
    - --gradient-checkpointing
    - --no-save-optim
    - --sglang-attention-backend
    - fa3
