    notes: >-
      Primary medium HPO candidate. Retry 5 preserves the padded-bshd parameters
      after retry 4 validated balanced critic rows and exact reward/train path
      agreement but failed before critic backward because the rewritten critic
      view lacked bshd max-sequence metadata. Critic-token padding metadata is
      now rebuilt from the rewritten rows. Retry 3 completed a healthy actor
      optimizer step but exposed Miles' replicated global raw_reward vector;
      the generic repartitioner now validates and preserves such fields. Retry 2
      stopped during initialization to clarify explicit checkpoint scheduling,
      and retry 1 exposed excessive packed-vs-padded actor drift before update 0.
      Uses Miles' native padded bshd data/loss path throughout, with conservative
      online critic LR and stronger K3 anchoring.

