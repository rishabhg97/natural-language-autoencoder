  d_model: 2688
  torch_dtype: bfloat16
  base_device_map: auto
  av_device_map: auto
  base_max_new_tokens: 48
  base_generation_backend: full_prefix
  activation_capture_backend: truncated_causal_prefix_per_anchor
  pre_condition_invariance_max_rel_l2: 1.0e-5
  behavior_max_new_tokens: 384
  behavior_generation_backend: full_prefix
  behavior_min_parse_rate: 0.90
  av_max_new_tokens: 384
  description_min_real_usable_fraction: 0.95
  description_min_real_closed_fraction: 0.95
  injection_scale: 75
  av_generation_prefix: "<explanation>\n"
  av_stop_text: "</explanation>"
  av_use_cache: true
  av_batch_controls: true
  nla_controls: [real, shuffled, none]
  nla_controls_by_position:
    pre_condition: [real]
    condition_close: [real]
    pre_decision: [real, shuffled, none]
  seed: 20260722

checkpoint_prepare:
  python: /workspace/interp/.venv/bin/python
  dcp_checkpoint: /workspace/interp/outputs/nano30b-nla-pilot/publication/r33_online_rl/internal_hero/a3e5_u342/actor/iter_0000342
  stage_dcp_checkpoint: /dev/shm/nano30b-nla-pilot/domain_eval/r33_u342_rl_av_dcp
